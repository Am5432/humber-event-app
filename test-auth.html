<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Humber Event Hub — Auth Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    /* Tab switcher */
    .tabs {
      display: flex;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      background: #f9fafb;
      border: none;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 0;
    }
    .tab.active {
      background: #4f46e5;
      color: #fff;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 8px;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-signup   { background: #059669; color: #fff; }
    .btn-microsoft {
      background: #2563eb; color: #fff;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-logout { background: #f3f4f6; color: #374151; margin-top: 4px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: #ccc;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .result-box {
      margin-top: 24px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1.5px solid #e5e7eb;
      overflow: hidden;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
    }
    .badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }
    .badge-ok      { background: #d1fae5; color: #065f46; }
    .badge-error   { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #fef3c7; color: #92400e; }

    pre {
      padding: 14px;
      font-size: 0.78rem;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 260px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eff6ff;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #1e40af;
    }
    .user-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .hint {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-bottom: 10px;
      margin-top: -4px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>Humber Event Hub</h1>
  <p class="subtitle">Auth test — connects to localhost:8000</p>

  <div id="user-pill" class="user-pill hidden">
    <div class="dot"></div>
    <span id="user-pill-text">Logged in</span>
  </div>

  <!-- Tab switcher -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN TAB -->
  <div id="tab-login">
    <div class="section-label">Email / Password</div>
    <input type="email" id="login-email" placeholder="you@example.com" />
    <input type="password" id="login-password" placeholder="Password" />
    <button class="btn-primary" onclick="loginEmail()">Log In</button>

    <div class="divider">or</div>

    <button class="btn-microsoft" onclick="loginMicrosoft()">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>

    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>

  <!-- SIGNUP TAB -->
  <div id="tab-signup" class="hidden">
    <div class="section-label">Create Account</div>
    <p class="hint">@humber.ca → student role &nbsp;|&nbsp; any other email → regular role</p>
    <input type="text"  id="signup-name"     placeholder="Display name (e.g. John Doe)" />
    <input type="email" id="signup-email"    placeholder="you@example.com" />
    <input type="password" id="signup-password"  placeholder="Password (min 6 chars)" />
    <input type="password" id="signup-confirm"   placeholder="Confirm password" />
    <button class="btn-signup" onclick="signUp()">Create Account</button>

    <div class="divider">or</div>

    <button class="btn-microsoft" onclick="loginMicrosoft()">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign up with Microsoft
    </button>
  </div>

  <div id="result-box" class="result-box hidden">
    <div class="result-header">
      <span id="result-label">Result</span>
      <span id="result-badge" class="badge"></span>
    </div>
    <pre id="output"></pre>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile,
    signInWithPopup,
    OAuthProvider,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ngwq_LuRurAFppWNR3vq96iKh3Fd-tI",
    authDomain: "humber-event-app.firebaseapp.com",
    projectId: "humber-event-app",
    storageBucket: "humber-event-app.firebasestorage.app",
    messagingSenderId: "870628936862",
    appId: "1:870628936862:web:c33b7170362ba33f2b7f8f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Tab switcher
  window.switchTab = (tab) => {
    document.getElementById("tab-login").classList.toggle("hidden", tab !== "login");
    document.getElementById("tab-signup").classList.toggle("hidden", tab !== "signup");
    document.querySelectorAll(".tab").forEach((el, i) => {
      el.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
    });
    document.getElementById("result-box").classList.add("hidden");
  };

  // Logged-in pill
  onAuthStateChanged(auth, user => {
    const pill = document.getElementById("user-pill");
    const pillText = document.getElementById("user-pill-text");
    if (user) {
      pill.classList.remove("hidden");
      pillText.textContent = `Signed in as ${user.email}  (uid: ${user.uid.substring(0, 10)}...)`;
    } else {
      pill.classList.add("hidden");
    }
  });

  function showResult(label, badge, badgeClass, text) {
    document.getElementById("result-box").classList.remove("hidden");
    document.getElementById("result-label").textContent = label;
    const b = document.getElementById("result-badge");
    b.textContent = badge;
    b.className = "badge " + badgeClass;
    document.getElementById("output").textContent = text;
  }

  async function testBackend(token, context) {
    showResult(`${context} — calling backend...`, "pending", "badge-pending", "GET /auth/me...");
    try {
      const res = await fetch("http://localhost:8000/auth/me", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json();
      if (res.ok) {
        showResult(
          `${context} — GET /auth/me`,
          `${res.status} OK`,
          "badge-ok",
          JSON.stringify(data, null, 2)
        );
      } else {
        showResult(`${context} — Backend Error`, `${res.status}`, "badge-error", JSON.stringify(data, null, 2));
      }
    } catch (e) {
      showResult(
        "Backend Unreachable",
        "error",
        "badge-error",
        "Could not reach http://localhost:8000\n\nStart the backend:\ncd backend && .venv/bin/uvicorn app.bootstrap.app:create_app --factory --reload\n\nError: " + e.message
      );
    }
  }

  // ── Login ──────────────────────────────────────────────────────────────────
  window.loginEmail = async () => {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    if (!email || !password) {
      showResult("Validation", "error", "badge-error", "Enter email and password.");
      return;
    }
    showResult("Signing in...", "pending", "badge-pending", "Contacting Firebase...");
    try {
      const result = await signInWithEmailAndPassword(auth, email, password);
      const token = await result.user.getIdToken();
      await testBackend(token, "Login");
    } catch (e) {
      showResult("Login Failed", "error", "badge-error", friendlyError(e));
    }
  };

  // ── Sign Up ────────────────────────────────────────────────────────────────
  window.signUp = async () => {
    const name     = document.getElementById("signup-name").value.trim();
    const email    = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value;
    const confirm  = document.getElementById("signup-confirm").value;

    if (!name || !email || !password || !confirm) {
      showResult("Validation", "error", "badge-error", "All fields are required.");
      return;
    }
    if (password !== confirm) {
      showResult("Validation", "error", "badge-error", "Passwords do not match.");
      return;
    }
    if (password.length < 6) {
      showResult("Validation", "error", "badge-error", "Password must be at least 6 characters.");
      return;
    }

    showResult("Creating account...", "pending", "badge-pending", "Contacting Firebase...");
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      // Save display name in Firebase
      await updateProfile(result.user, { displayName: name });

      const token = await result.user.getIdToken();
      const role = email.toLowerCase().endsWith("@humber.ca") ? "student" : "regular";
      showResult(
        "Account created",
        "pending",
        "badge-pending",
        `Firebase account created!\nEmail: ${email}\nDisplay name: ${name}\nExpected role: ${role}\n\nRegistering with backend...`
      );
      await testBackend(token, "Sign Up");
    } catch (e) {
      showResult("Sign Up Failed", "error", "badge-error", friendlyError(e));
    }
  };

  // ── Microsoft SSO ──────────────────────────────────────────────────────────
  window.loginMicrosoft = async () => {
    showResult("Microsoft SSO", "pending", "badge-pending", "Opening Microsoft login popup...");
    const provider = new OAuthProvider("microsoft.com");
    provider.setCustomParameters({ tenant: "common" });
    try {
      const result = await signInWithPopup(auth, provider);
      const token = await result.user.getIdToken();
      await testBackend(token, "Microsoft SSO");
    } catch (e) {
      showResult(
        "Microsoft SSO Error", "error", "badge-error",
        e.code + "\n" + e.message +
        (e.code === "auth/popup-blocked"   ? "\n\nAllow popups for this page in your browser." : "") +
        (e.code === "auth/unauthorized-domain" ? "\n\nAdd localhost to Firebase Console:\nAuthentication → Settings → Authorized domains" : "")
      );
    }
  };

  // ── Logout ─────────────────────────────────────────────────────────────────
  window.logout = async () => {
    await signOut(auth);
    showResult("Logged out", "ok", "badge-ok", "Session cleared.");
    ["login-email","login-password","signup-name","signup-email","signup-password","signup-confirm"]
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ""; });
  };

  // ── Error messages ─────────────────────────────────────────────────────────
  function friendlyError(e) {
    const map = {
      "auth/email-already-in-use":    "This email is already registered. Try logging in instead.",
      "auth/invalid-email":           "Invalid email address.",
      "auth/weak-password":           "Password is too weak. Use at least 6 characters.",
      "auth/user-not-found":          "No account found with this email.",
      "auth/wrong-password":          "Incorrect password.",
      "auth/invalid-credential":      "Incorrect email or password.",
      "auth/too-many-requests":       "Too many attempts. Try again later.",
      "auth/network-request-failed":  "Network error. Check your connection.",
    };
    return map[e.code] || (e.code + "\n" + e.message);
  }
</script>
</body>
</html>
